<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIF Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0e0f13;--surface:#181a21;--surface-hover:#1f222c;
    --border:#2a2d3a;--text:#e4e6ed;--text-dim:#7a7f92;
    --accent:#4f8cff;--accent-glow:rgba(79,140,255,.25);
    --danger:#ff5c5c;--danger-bg:rgba(255,92,92,.12);
    --success:#3dd68c;--success-bg:rgba(61,214,140,.12);
    --radius:14px;--radius-sm:8px;
  }
  body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;line-height:1.5;min-height:100vh;padding:24px 16px 80px}
  .app{max-width:720px;margin:0 auto}

  .header{text-align:center;margin-bottom:32px;padding-top:16px}
  .header-logo{height:36px;margin-bottom:12px;mix-blend-mode:screen}
  .header h1{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;letter-spacing:-.5px;background:linear-gradient(135deg,var(--accent),#a87cff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

  .footer{text-align:center;padding:32px 0 8px;display:flex;align-items:center;justify-content:center;gap:8px;opacity:.4;transition:opacity .2s}
  .footer:hover{opacity:.7}
  .footer-logo{width:24px;height:24px;border-radius:50%;mix-blend-mode:screen}
  .footer span{font-size:12px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;letter-spacing:.3px}

  .step-badge{display:inline-flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--accent);margin-bottom:12px;letter-spacing:.5px;text-transform:uppercase}
  .step-badge::before{content:attr(data-step);display:flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:var(--accent);color:var(--bg);font-size:12px;font-weight:700}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px}

  /* 드롭존 */
  .dropzone{border:2px dashed var(--border);border-radius:var(--radius);padding:40px 20px;text-align:center;transition:all .25s}
  .dropzone.drag-over{border-color:var(--accent);background:rgba(79,140,255,.04);box-shadow:0 0 0 4px var(--accent-glow)}
  .dropzone-icon{font-size:40px;margin-bottom:8px;opacity:.7}
  .dropzone-text{color:var(--text-dim);font-size:14px}

  .file-btn{display:inline-block;margin-top:14px;padding:10px 24px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s}
  .file-btn:hover{background:#6aa0ff}

  /* 메시지 */
  .msg{font-size:13px;padding:10px 14px;border-radius:var(--radius-sm);margin-top:12px;display:none;align-items:center;gap:6px}
  .msg.warn{display:flex;background:var(--danger-bg);color:var(--danger);border:1px solid rgba(255,92,92,.2)}
  .msg.info{display:flex;background:var(--success-bg);color:var(--success);border:1px solid rgba(61,214,140,.2)}

  /* 썸네일 리스트 (드래그 정렬) */
  .thumb-list{display:flex;gap:12px;flex-wrap:wrap;margin-top:16px;min-height:0}
  .thumb-item{
    position:relative;width:100px;height:100px;
    border-radius:var(--radius-sm);overflow:hidden;
    border:2px solid var(--border);background:#111;
    cursor:grab;flex-shrink:0;
    transition:border-color .2s,transform .15s,box-shadow .2s;
    user-select:none;
  }
  .thumb-item:hover{border-color:var(--accent)}
  .thumb-item.dragging{opacity:.35;transform:scale(.92)}
  .thumb-item.drop-target-left{box-shadow:-4px 0 0 0 var(--accent)}
  .thumb-item.drop-target-right{box-shadow:4px 0 0 0 var(--accent)}
  .thumb-item img{width:100%;height:100%;object-fit:cover;pointer-events:none}

  .thumb-order{
    position:absolute;top:4px;left:4px;
    background:var(--accent);color:#fff;
    font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;
    width:22px;height:22px;display:flex;align-items:center;justify-content:center;
    border-radius:50%;z-index:2;pointer-events:none;
  }
  .thumb-del{
    position:absolute;top:4px;right:4px;
    width:22px;height:22px;border-radius:50%;
    background:rgba(0,0,0,.75);color:var(--danger);
    border:none;cursor:pointer;font-size:13px;
    display:flex;align-items:center;justify-content:center;
    opacity:0;transition:opacity .15s;z-index:2;
  }
  .thumb-item:hover .thumb-del{opacity:1}

  .reorder-hint{font-size:12px;color:var(--text-dim);margin-top:12px;display:none}

  /* 옵션 */
  .option-row{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 0;border-bottom:1px solid var(--border)}
  .option-row:last-child{border-bottom:none}
  .option-label{font-size:14px;font-weight:500;white-space:nowrap}
  .option-sub{font-size:12px;color:var(--text-dim);font-weight:400}
  .option-control{display:flex;align-items:center;gap:10px;flex-shrink:0}

  input[type="range"]{-webkit-appearance:none;width:160px;height:6px;border-radius:3px;background:var(--border);outline:none}
  input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 0 3px var(--accent-glow)}
  .slider-val{font-family:'JetBrains Mono',monospace;font-size:15px;color:var(--accent);min-width:40px;text-align:right;font-weight:600}
  .slider-sub{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);min-width:44px;text-align:right}

  select{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;font-family:'Outfit',sans-serif;font-size:13px;cursor:pointer;outline:none;transition:border-color .2s}
  select:focus{border-color:var(--accent)}

  /* 커스텀 사이즈 입력 */
  .custom-size{display:none;align-items:center;gap:6px;margin-top:8px}
  .custom-size.active{display:flex}
  .custom-size input{width:80px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 10px;font-family:'JetBrains Mono',monospace;font-size:13px;outline:none;text-align:center}
  .custom-size input:focus{border-color:var(--accent)}
  .custom-size span{color:var(--text-dim);font-size:13px}

  /* 버튼 */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 28px;border:none;border-radius:var(--radius-sm);font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s}
  .btn-primary{background:var(--accent);color:#fff;box-shadow:0 2px 12px var(--accent-glow)}
  .btn-primary:hover:not(:disabled){background:#6aa0ff;transform:translateY(-1px)}
  .btn-primary:disabled{opacity:.35;cursor:not-allowed;box-shadow:none}
  .btn-secondary{background:var(--surface-hover);color:var(--text);border:1px solid var(--border)}
  .btn-secondary:hover{border-color:var(--accent)}
  .action-bar{display:flex;gap:12px;flex-wrap:wrap}

  /* 프로그레스 */
  .progress-wrap{margin-top:16px;display:none}
  .progress-wrap.active{display:block}
  .progress-bar-bg{width:100%;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
  .progress-bar-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),#a87cff);border-radius:4px;transition:width .15s}
  .progress-text{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-dim);margin-top:6px;text-align:right}

  /* 에러 메시지 (생성 실패) */
  .gen-msg{font-size:13px;padding:10px 14px;border-radius:var(--radius-sm);margin-top:12px;display:none;align-items:center;gap:6px}
  .gen-msg.error{display:flex;background:var(--danger-bg);color:var(--danger);border:1px solid rgba(255,92,92,.2)}

  /* 미리보기 */
  .preview-area{display:none;margin-top:20px;text-align:center}
  .preview-area.active{display:block}
  .preview-area img{max-width:100%;border-radius:var(--radius-sm);border:1px solid var(--border);background:#fff}
  .preview-meta{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-dim);margin-top:8px}

  @media(max-width:520px){
    body{padding:16px 10px 60px}.card{padding:16px}.dropzone{padding:28px 14px}
    input[type="range"]{width:100px}
    .option-row{flex-direction:column;align-items:flex-start;gap:8px}
    .thumb-item{width:80px;height:80px}
    .btn{padding:10px 20px;font-size:14px}
  }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <img class="header-logo" id="headerLogo" alt="MOLIP">
    <h1>GIF Generator</h1>
  </div>

  <!-- STEP 1: 이미지 업로드 -->
  <div class="card">
    <div class="step-badge" data-step="1">이미지 업로드</div>
    <div class="dropzone" id="dropzone">
      <div class="dropzone-icon">📁</div>
      <div class="dropzone-text">이미지를 여기에 드래그해서 놓으세요</div>
      <div class="dropzone-text" style="margin-top:4px;font-size:12px">PNG, JPG, WEBP · 3~10장</div>
    </div>
    <div style="text-align:center;margin-top:12px">
      <button class="file-btn" id="fileBtnTrigger">📂 파일 선택</button>
      <input type="file" id="fileInput" accept=".png,.jpg,.jpeg,.webp" multiple style="display:none">
    </div>
    <div class="msg" id="uploadMsg"></div>
    <div class="thumb-list" id="thumbList"></div>
    <div class="reorder-hint" id="reorderHint">드래그하여 순서를 변경하세요</div>
  </div>

  <!-- STEP 2: 옵션 -->
  <div class="card">
    <div class="step-badge" data-step="2">옵션 설정</div>

    <div class="option-row">
      <div>
        <div class="option-label">배속</div>
      </div>
      <div class="option-control">
        <input type="range" id="speedSlider" min="0" max="10" step="1" value="3">
        <span class="slider-val" id="speedVal">1x</span>
        <span class="slider-sub" id="speedMs">500ms</span>
      </div>
    </div>

    <div class="option-row">
      <div>
        <div class="option-label">출력 크기</div>
      </div>
      <div class="option-control">
        <select id="resSelect">
          <option value="0">원본 유지</option>
          <option value="256">256px</option>
          <option value="480">480px</option>
          <option value="512" selected>512px</option>
          <option value="720">720px</option>
          <option value="1024">1024px</option>
          <option value="custom">커스텀</option>
        </select>
      </div>
    </div>
    <div class="custom-size" id="customSizeWrap">
      <input type="number" id="customW" placeholder="가로" min="50" max="4096">
      <span>×</span>
      <input type="number" id="customH" placeholder="세로" min="50" max="4096">
      <span>px</span>
    </div>
  </div>

  <!-- STEP 3: 생성 -->
  <div class="card">
    <div class="step-badge" data-step="3">생성 & 다운로드</div>
    <div class="action-bar">
      <button class="btn btn-primary" id="generateBtn" disabled>🎬 GIF 생성</button>
      <button class="btn btn-secondary" id="downloadBtn" style="display:none">💾 다운로드</button>
    </div>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">0%</div>
    </div>
    <div class="gen-msg" id="genMsg"></div>
    <div class="preview-area" id="previewArea">
      <img id="previewImg" alt="Generated GIF">
      <div class="preview-meta" id="previewMeta"></div>
    </div>
  </div>

  <div class="footer">
    <img class="footer-logo" id="footerLogo" alt="MOLIP">
    <span>Powered by MOLIP</span>
  </div>

</div>

<!-- gif.js 라이브러리 로드 -->

    } else {
      console.error('[GIF] Worker load failed:', xhr.status);
    }
  };
  xhr.onerror = function() { console.error('[GIF] Worker fetch error'); };
  xhr.send();
})();

/* ============================================
   DOM 참조
   ============================================ */
var dropzone = document.getElementById('dropzone');
var fileInput = document.getElementById('fileInput');
var fileBtnTrigger = document.getElementById('fileBtnTrigger');
var thumbList = document.getElementById('thumbList');
var reorderHint = document.getElementById('reorderHint');
var uploadMsg = document.getElementById('uploadMsg');
var speedSlider = document.getElementById('speedSlider');
var speedVal = document.getElementById('speedVal');
var speedMs = document.getElementById('speedMs');
var resSelect = document.getElementById('resSelect');
var customSizeWrap = document.getElementById('customSizeWrap');
var customW = document.getElementById('customW');
var customH = document.getElementById('customH');
var generateBtn = document.getElementById('generateBtn');
var downloadBtn = document.getElementById('downloadBtn');
var progressWrap = document.getElementById('progressWrap');
var progressFill = document.getElementById('progressFill');
var progressText = document.getElementById('progressText');
var genMsg = document.getElementById('genMsg');
var previewArea = document.getElementById('previewArea');
var previewImg = document.getElementById('previewImg');
var previewMeta = document.getElementById('previewMeta');
var MIN_IMAGES = 3;
var SOFT_LIMIT = 5;
var MAX_IMAGES = 10;


/* ============================================
   유틸: 인라인 메시지
   ============================================ */
function showMsg(text, type) { uploadMsg.textContent = text; uploadMsg.className = 'msg ' + type; }
function hideMsg() { uploadMsg.className = 'msg'; }
function showGenMsg(text) { genMsg.textContent = text; genMsg.className = 'gen-msg error'; }
function hideGenMsg() { genMsg.className = 'gen-msg'; }

/* 생성 버튼 상태 */
function updateGenBtn() { generateBtn.disabled = (state.images.length < MIN_IMAGES || state.images.length > MAX_IMAGES); }

/* 장수 검증 */
function validateCount() {
  var n = state.images.length;
  if (n > MAX_IMAGES) showMsg('최대 ' + MAX_IMAGES + '장까지 업로드 가능합니다.', 'warn');
  else if (n > 0 && n < MIN_IMAGES) showMsg('최소 ' + MIN_IMAGES + '장이 필요합니다. (현재 ' + n + '장)', 'warn');
  else if (n >= MIN_IMAGES) showMsg(n + '장 준비 완료!', 'info');
  else hideMsg();
  reorderHint.style.display = n >= 2 ? 'block' : 'none';
}

/* ============================================
   파일 로드
   ============================================ */
function handleFiles(fileList) {
  var allowed = ['image/png', 'image/jpeg', 'image/webp'];
  var files = Array.prototype.slice.call(fileList);
  var valid = files.filter(function(f) { return allowed.indexOf(f.type) !== -1; });
  if (valid.length < files.length) showMsg('PNG, JPG, WEBP 파일만 지원합니다.', 'warn');
  if (valid.length === 0) return;

  var pending = valid.length;
  valid.forEach(function(file) {
    if (state.images.length >= MAX_IMAGES) { pending--; if (pending <= 0) done(); return; }
    var url = URL.createObjectURL(file);
    var img = new Image();
    img.onload = function() {
      if (state.images.length < MAX_IMAGES) state.images.push({ file: file, url: url, img: img });
      else URL.revokeObjectURL(url);
      pending--;
      if (pending <= 0) done();
    };
    img.onerror = function() { URL.revokeObjectURL(url); pending--; if (pending <= 0) done(); };
    img.src = url;
  });
  function done() { validateCount(); renderThumbs(); updateGenBtn(); }
}

/* ============================================
   썸네일 드래그 정렬
   ============================================ */
var dragSrcIdx = null;

function renderThumbs() {
  thumbList.innerHTML = '';
  state.images.forEach(function(item, i) {
    var el = document.createElement('div');
    el.className = 'thumb-item';
    el.draggable = true;
    el.dataset.idx = i;

    var imgEl = document.createElement('img');
    imgEl.src = item.url;
    el.appendChild(imgEl);

    /* 순서 번호 */
    var order = document.createElement('span');
    order.className = 'thumb-order';
    order.textContent = i + 1;
    el.appendChild(order);

    /* 삭제 버튼 */
    var del = document.createElement('button');
    del.className = 'thumb-del';
    del.textContent = '\u2715';
    del.addEventListener('click', (function(idx) { return function(e) {
      e.stopPropagation();
      URL.revokeObjectURL(state.images[idx].url);
      state.images.splice(idx, 1);
      validateCount(); renderThumbs(); updateGenBtn();
    }; })(i));
    el.appendChild(del);

    /* 드래그 이벤트 */
    el.addEventListener('dragstart', onDragStart);
    el.addEventListener('dragover', onDragOver);
    el.addEventListener('dragenter', onDragEnter);
    el.addEventListener('dragleave', onDragLeave);
    el.addEventListener('drop', onDrop);
    el.addEventListener('dragend', onDragEnd);

    thumbList.appendChild(el);
  });
}

function onDragStart(e) {
  dragSrcIdx = parseInt(this.dataset.idx);
  this.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  /* 투명 이미지로 기본 고스트 숨기기 (선택) */
  e.dataTransfer.setData('text/plain', dragSrcIdx);
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
}

function onDragEnter(e) {
  e.preventDefault();
  clearDropTargets();
  var targetIdx = parseInt(this.dataset.idx);
  if (dragSrcIdx === null || dragSrcIdx === targetIdx) return;
  if (dragSrcIdx < targetIdx) this.classList.add('drop-target-right');
  else this.classList.add('drop-target-left');
}

function onDragLeave() {
  this.classList.remove('drop-target-left', 'drop-target-right');
}

function onDrop(e) {
  e.preventDefault(); e.stopPropagation();
  var targetIdx = parseInt(this.dataset.idx);
  if (dragSrcIdx === null || dragSrcIdx === targetIdx) return;
  /* 배열 이동 */
  var moved = state.images.splice(dragSrcIdx, 1)[0];
  state.images.splice(targetIdx, 0, moved);
  dragSrcIdx = null;
  clearDropTargets();
  renderThumbs();
}

function onDragEnd() {
  dragSrcIdx = null;
  clearDropTargets();
  document.querySelectorAll('.thumb-item.dragging').forEach(function(el) { el.classList.remove('dragging'); });
}

function clearDropTargets() {
  document.querySelectorAll('.thumb-item').forEach(function(el) {
    el.classList.remove('drop-target-left', 'drop-target-right');
  });
}

/* ============================================
   파일 드롭존 (이미지 파일 추가용)
   ============================================ */
dropzone.addEventListener('dragover', function(e) { e.preventDefault(); e.stopPropagation(); dropzone.classList.add('drag-over'); });
dropzone.addEventListener('dragleave', function(e) { e.preventDefault(); dropzone.classList.remove('drag-over'); });
dropzone.addEventListener('drop', function(e) {
  e.preventDefault(); e.stopPropagation(); dropzone.classList.remove('drag-over');
  if (e.dataTransfer.files && e.dataTransfer.files.length > 0) handleFiles(e.dataTransfer.files);
});

/* 파일 선택 버튼 */
fileBtnTrigger.addEventListener('click', function(e) { e.preventDefault(); e.stopPropagation(); fileInput.value = ''; fileInput.click(); });
fileInput.addEventListener('change', function() { if (fileInput.files.length > 0) handleFiles(fileInput.files); fileInput.value = ''; });

/* ============================================
   옵션 컨트롤
   ============================================ */
/* 슬라이더 */
/* 배속 스텝: 슬라이더 인덱스 → 배속 배율 */
var SPEED_STEPS = [0.25, 0.5, 0.75, 1, 1.5, 2, 3, 4, 5, 8, 10];
function getSpeed() { return SPEED_STEPS[parseInt(speedSlider.value)]; }
function getDelay() { return Math.round(500 / getSpeed()); }
function getDelayForCount() {
  var base = getDelay();
  var n = state.images.length;
  if (n <= SOFT_LIMIT) return base;
  if (n <= 7) return Math.max(80, Math.round(base * 0.85));
  return Math.max(60, Math.round(base * 0.7));
}
function updateSpeedDisplay() {
  var s = getSpeed();
  speedVal.textContent = s + 'x';
  speedMs.textContent = getDelay() + 'ms';
}
speedSlider.addEventListener('input', updateSpeedDisplay);

/* 커스텀 사이즈 토글 */
resSelect.addEventListener('change', function() {
  customSizeWrap.classList.toggle('active', resSelect.value === 'custom');
});

/* ============================================
   GIF 생성
   ============================================ */
generateBtn.addEventListener('click', function() {
  if (state.images.length < MIN_IMAGES || state.images.length > MAX_IMAGES) return;
  hideGenMsg();

  /* 워커 로드 확인 */
  if (!state.workerUrl) {
    showGenMsg('GIF 엔진 로드 중입니다. 잠시 후 다시 시도해주세요.');
    return;
  }

  var delay = getDelayForCount();
  var resPx = parseInt(resSelect.value) || 0;
  var customMode = (resSelect.value === 'custom');
  var cw = parseInt(customW.value) || 0;
  var ch = parseInt(customH.value) || 0;

  /* 가장 큰 이미지 기준 원본 사이즈 */
  var maxW = 0, maxH = 0;
  state.images.forEach(function(o) { maxW = Math.max(maxW, o.img.naturalWidth); maxH = Math.max(maxH, o.img.naturalHeight); });

  /* 출력 사이즈 결정 */
  var outW, outH;
  if (customMode && cw > 0 && ch > 0) {
    outW = cw; outH = ch;
  } else if (customMode && cw > 0) {
    outW = cw; outH = Math.round(maxH * (cw / maxW));
  } else if (resPx > 0) {
    outW = resPx; outH = Math.round(maxH * (resPx / maxW));
  } else {
    outW = maxW; outH = maxH;
  }

  /* UI 전환 */
  generateBtn.disabled = true;
  downloadBtn.style.display = 'none';
  previewArea.classList.remove('active');
  progressWrap.classList.add('active');
  progressFill.style.width = '0%';
  progressText.textContent = '인코딩 중...';

  /* gif.js 인스턴스 (Blob 워커 사용) */
  var gif = new GIF({
    workers: 2,
    quality: 10,
    width: outW,
    height: outH,
    workerScript: state.workerUrl,
    repeat: 0  /* 무한 루프 고정 */
  });

  /* 각 프레임 렌더링 */
  var canvas = document.createElement('canvas');
  canvas.width = outW; canvas.height = outH;
  var ctx = canvas.getContext('2d');

  state.images.forEach(function(o) {
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, outW, outH);

    /* 이미지를 출력 사이즈 내에서 비율 유지 중앙 배치 */
    var scale = Math.min(outW / o.img.naturalWidth, outH / o.img.naturalHeight);
    var dw = o.img.naturalWidth * scale;
    var dh = o.img.naturalHeight * scale;
    ctx.drawImage(o.img, (outW - dw) / 2, (outH - dh) / 2, dw, dh);

    gif.addFrame(ctx, { copy: true, delay: delay });
  });

  /* 진행률 */
  gif.on('progress', function(p) {
    var pct = Math.round(p * 100);
    progressFill.style.width = pct + '%';
    progressText.textContent = pct + '%';
  });

  /* 완료 */
  gif.on('finished', function(blob) {
    state.gifBlob = blob;
    previewImg.src = URL.createObjectURL(blob);
    previewArea.classList.add('active');
    var kb = (blob.size / 1024).toFixed(1);
    previewMeta.textContent = outW + ' × ' + outH + 'px · ' + kb + 'KB · ' + state.images.length + ' frames · ' + getSpeed() + 'x (' + delay + 'ms/frame)';
    downloadBtn.style.display = 'inline-flex';
    progressWrap.classList.remove('active');
    generateBtn.disabled = false; updateGenBtn();
  });

  /* 에러 핸들링 */
  gif.on('error', function(err) {
    showGenMsg('GIF 생성 실패: ' + (err.message || err));
    progressWrap.classList.remove('active');
    generateBtn.disabled = false; updateGenBtn();
  });

  gif.render();
});

/* ============================================
   다운로드
   ============================================ */
downloadBtn.addEventListener('click', function() {
  if (!state.gifBlob) return;
  var a = document.createElement('a');
  a.href = URL.createObjectURL(state.gifBlob);
  a.download = 'output.gif';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
});
</script>
</body>
